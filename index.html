<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대전관광공사 교육훈련 이수 관리 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1D6FA4;--bl:#E6F1FB;--bm:#B5D4F4;--bd:#0C447C;
  --gl:#EAF3DE;--gm:#C0DD97;--gd:#27500A;
  --al:#FAEEDA;--am:#FAC775;--ad:#633806;
  --rl:#FCEBEB;--rm:#F7C1C1;--rd:#791F1F;
  --pl:#EEEDFE;--pd:#3C3489;
  --gray:#F5F6F8;--bdr:#E2E4E9;--muted:#6B7280;
  --text:#1A1A2E;--white:#fff;--r:10px;--rl2:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html { background-color: var(--gray); }
body { font-family:'Noto Sans KR',sans-serif; color:var(--text); line-height:1.5; background-color:var(--gray); display:flex; justify-content:center; }
.app-container { width:100%; max-width:500px; background:#fff; min-height:100vh; position:relative; box-shadow:0 0 20px rgba(0,0,0,0.05); }

/* Header & Nav */
header { padding:24px 20px; background:var(--white); border-bottom:1px solid var(--bdr); position:sticky; top:0; z-index:100; }
.logo-area { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.logo-area h1 { font-size:18px; font-weight:700; color:var(--blue); letter-spacing:-0.5px; }
nav { display:flex; gap:8px; }
nav button { flex:1; padding:12px; border-radius:var(--r); border:1px solid var(--bdr); background:var(--white); font-size:14px; font-weight:500; color:var(--muted); cursor:pointer; transition:0.2s; }
nav button.active { background:var(--blue); color:var(--white); border-color:var(--blue); }

/* Page Control */
.page { display:none; padding:20px; animation:fadeIn 0.3s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

/* Common UI */
.card { background:var(--white); border:1px solid var(--bdr); border-radius:var(--rl2); padding:20px; margin-bottom:20px; }
.card-title { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.fg { margin-bottom:16px; }
.fg label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:6px; }
.fg label .req { color:var(--rd); }
.fg input, .fg select, .fg textarea { width:100%; padding:12px; border-radius:var(--r); border:1px solid var(--bdr); font-size:14px; outline:none; transition:0.2s; }
.fg input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--bl); }

/* Time Wrap */
.time-wrap { display:flex; align-items:center; gap:6px; }
.time-unit { font-size:13px; color:var(--muted); margin-right:4px; }

.btn-primary { width:100%; padding:14px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; }
.btn-primary:disabled { background:var(--bdr); cursor:not-allowed; }

/* Dashboard & Stats */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.stat-box { padding:16px; border-radius:var(--r); border:1px solid var(--bdr); }
.prog-bar-bg { width:100%; height:10px; background:var(--gray); border-radius:5px; overflow:hidden; margin-top:10px; }
.prog-bar-fill { height:100%; background:var(--blue); width:0%; transition:1s ease-out; }

/* Table */
.table-wrap { overflow-x:auto; margin-top:10px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--gray); padding:10px; text-align:left; color:var(--muted); font-weight:500; border-bottom:1px solid var(--bdr); }
td { padding:12px 10px; border-bottom:1px solid var(--bdr); }
.tag { padding:2px 6px; border-radius:4px; font-size:11px; font-weight:500; }

#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:30px; background:rgba(0,0,0,0.8); color:#fff; font-size:14px; z-index:1000; display:none; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo-area">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" color="#1D6FA4"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      <h1>대전관광공사 교육훈련 이수 관리</h1>
    </div>
    <nav>
      <button id="nav-f" class="active" onclick="showPage('f')">교육 신청</button>
      <button id="nav-lu" onclick="showPage('lu')">현황 조회</button>
      <button id="nav-bk" onclick="showPage('bk')">관리자(Bulk)</button>
    </nav>
  </header>

  <div id="page-f" class="page active">
    <div class="card">
      <div class="card-title">🚀 교육 이수 신청</div>
      <div class="fg">
        <label>사번 <span class="req">*</span></label>
        <input type="text" id="f-id" placeholder="사번 8자리 입력">
      </div>
      <div class="fg">
        <label>성명 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="이름 입력">
      </div>
      <div class="fg">
        <label>과정명 <span class="req">*</span></label>
        <input type="text" id="f-course" placeholder="정확한 과정명 입력">
      </div>
      
      <div class="fg">
        <label>이수 시간 <span class="req">*</span></label>
        <div class="time-wrap">
          <input type="number" id="f-hours-h" placeholder="0" min="0" style="width:70px;text-align:center;">
          <span class="time-unit">시간</span>
          <input type="number" id="f-hours-m" placeholder="0" min="0" max="59" step="5" style="width:70px;text-align:center;" oninput="clampMinutes(this)">
          <span class="time-unit">분</span>
          <span id="f-hours-preview" style="font-size:12px;color:var(--blue);font-weight:700;margin-left:5px;"></span>
        </div>
      </div>

      <div class="fg">
        <label>교육 구분</label>
        <select id="f-cat">
          <option value="공통필수">공통필수 (법정의무 등)</option>
          <option value="직무역량">직무역량</option>
          <option value="리더십">리더십</option>
          <option value="기타">기타</option>
        </select>
      </div>
      
      <div class="fg">
        <label>수료증 첨부 <span class="req">*</span></label>
        <input type="file" id="f-file" accept="image/*,application/pdf">
      </div>
      <button id="f-btn" class="btn-primary" onclick="onFSubmit()">제출하기</button>
    </div>
  </div>

  <div id="page-lu" class="page">
    <div class="card">
      <div class="card-title">🔍 개인 이수 현황 조회</div>
      <div style="display:flex; gap:8px;">
        <input type="text" id="lu-id" placeholder="사번 입력" style="flex:1;">
        <button class="btn-primary" style="width:80px; margin-top:0;" onclick="onLuSearch()">조회</button>
      </div>
    </div>
    <div id="lu-result" style="display:none;">
      <div class="stat-grid">
        <div class="stat-box" style="background:var(--bl);">
          <div style="font-size:12px; color:var(--muted);">누적 이수 시간</div>
          <div id="lu-total-hours" style="font-size:18px; font-weight:700; color:var(--blue);">0분</div>
        </div>
        <div class="stat-box" style="background:var(--gl);">
          <div style="font-size:12px; color:var(--muted);">승인 건수</div>
          <div id="lu-count" style="font-size:18px; font-weight:700; color:var(--gd);">0건</div>
        </div>
      </div>
      <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:700;">
          <span>목표 달성도 (50시간)</span>
          <span id="lu-total-prog">0%</span>
        </div>
        <div class="prog-bar-bg"><div id="lu-total-bar" class="prog-bar-fill"></div></div>
      </div>
      <div class="table-wrap"><table id="lu-table"><thead><tr><th>과정명</th><th>시간</th><th>상태</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>

  <div id="page-bk" class="page">
    <div class="card">
      <div class="card-title">⚙️ 관리자 일괄 등록 및 수정</div>
      <div class="fg">
        <label>CSV 파일 업로드</label>
        <input type="file" id="bk-file" accept=".csv" onchange="onBkFileChange(event)">
      </div>
      <button class="btn-primary" style="background:var(--muted);" onclick="downloadSampleCSV()">샘플 양식 다운로드</button>
    </div>

    <div id="bk-edit-area" class="card" style="display:none; border:2px solid var(--blue);">
      <div class="card-title">✏️ 선택 항목 수정</div>
      <input type="hidden" id="bk-row-idx">
      <div class="fg">
        <label>과정명</label>
        <input type="text" id="bk-course">
      </div>
      <div class="fg">
        <label>시간 수정</label>
        <div class="time-wrap">
          <input type="number" id="bk-hours-h" style="width:60px; text-align:center;">
          <span class="time-unit">시간</span>
          <input type="number" id="bk-hours-m" style="width:60px; text-align:center;">
          <span class="time-unit">분</span>
        </div>
      </div>
      <div class="fg">
        <label>승인 상태</label>
        <select id="bk-status">
          <option value="승인">승인</option>
          <option value="대기">대기</option>
          <option value="반려">반려</option>
        </select>
      </div>
      <button class="btn-primary" onclick="onBkUpdate()">정보 업데이트</button>
    </div>

    <div id="bk-list-wrap" class="card" style="display:none; padding:10px;">
      <div class="table-wrap"><table id="bk-table"><thead><tr><th>이름</th><th>과정명</th><th>시간</th><th>관리</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzQp9q5-N5mY8q-L9O8zI0S_qZ5R5R/exec"; 

// ── 시간 헬퍼 함수 ──
function toMins(val) {
  const n = Number(val);
  if (!n) return 0;
  // 기존 데이터가 200 이하 정수이면 '시간'으로 보고 분으로 환산
  if (Number.isInteger(n) && n <= 200) return n * 60;
  return n; 
}

function minsToStr(m) {
  if (!m || m <= 0) return '0분';
  const h = Math.floor(m / 60);
  const min = Math.round(m % 60);
  if (h === 0) return min + '분';
  if (min === 0) return h + '시간';
  return h + '시간 ' + min + '분';
}

function clampMinutes(el) {
  if (parseInt(el.value) > 59) el.value = 59;
  if (parseInt(el.value) < 0) el.value = 0;
  const h = parseInt(document.getElementById('f-hours-h').value) || 0;
  const m = parseInt(document.getElementById('f-hours-m').value) || 0;
  const preview = document.getElementById('f-hours-preview');
  if (preview) preview.textContent = (h > 0 || m > 0) ? "총 " + minsToStr(h * 60 + m) : "";
}

// UI 제어
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
}

function showToast(m, color='#1D6FA4') {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.background = color; t.style.display = 'block';
  setTimeout(() => { t.style.display='none'; }, 2500);
}

// 교육 신청 (f)
async function onFSubmit() {
  const id = document.getElementById('f-id').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const course = document.getElementById('f-course').value.trim();
  const hh = parseInt(document.getElementById('f-hours-h').value) || 0;
  const hm = parseInt(document.getElementById('f-hours-m').value) || 0;
  const fileEl = document.getElementById('f-file');

  if (!id || !name || !course || (hh===0 && hm===0) || !fileEl.files[0]) {
    alert("모든 필수 항목을 입력하고 수료증을 첨부해주세요."); return;
  }

  const btn = document.getElementById('f-btn');
  btn.disabled = true; btn.textContent = "제출 중...";

  const file = fileEl.files[0];
  const reader = new FileReader();
  reader.onload = async function(e) {
    const payload = {
      action: "submit",
      id, name, course,
      hours: (hh * 60) + hm,
      cat: document.getElementById('f-cat').value,
      fileName: file.name,
      fileData: e.target.result.split(',')[1]
    };
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      const res = await resp.json();
      if(res.result === "success") {
        showToast("제출 완료!", "#27500A");
        document.querySelectorAll('#page-f input').forEach(i => i.value='');
        document.getElementById('f-hours-preview').textContent = "";
      }
    } catch(e) { alert("서버 오류가 발생했습니다."); }
    finally { btn.disabled = false; btn.textContent = "제출하기"; }
  };
  reader.readAsDataURL(file);
}

// 현황 조회 (lu)
async function onLuSearch() {
  const id = document.getElementById('lu-id').value.trim();
  if(!id) return;
  showToast("데이터 검색 중...");
  try {
    const resp = await fetch(`${API_URL}?action=query&id=${id}`);
    const data = await resp.json();
    const tbody = document.querySelector('#lu-table tbody');
    tbody.innerHTML = "";
    
    if(data.length === 0) { alert("조회된 데이터가 없습니다."); return; }

    let totalMins = 0; let count = 0;
    data.forEach(r => {
      const m = toMins(r.hours);
      if(r.status === "승인") { totalMins += m; count++; }
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.course}</td><td>${minsToStr(m)}</td><td><span class="tag" style="background:var(--bl);color:var(--blue)">${r.status}</span></td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('lu-total-hours').textContent = minsToStr(totalMins);
    document.getElementById('lu-count').textContent = count + "건";
    const goal = 3000; // 50시간
    const per = Math.min(Math.round((totalMins/goal)*100), 100);
    document.getElementById('lu-total-prog').textContent = per + "%";
    document.getElementById('lu-total-bar').style.width = per + "%";
    document.getElementById('lu-result').style.display = 'block';
  } catch(e) { alert("조회 실패"); }
}

// 관리자 일괄 리스트 로드 (bk)
async function loadBkList() {
  showToast("전체 목록 로드 중...");
  try {
    const resp = await fetch(`${API_URL}?action=adminList`);
    const data = await resp.json();
    const tbody = document.querySelector('#bk-table tbody');
    tbody.innerHTML = "";
    data.reverse().forEach(r => {
      const tr = document.createElement('tr');
      const m = toMins(r.hours);
      tr.innerHTML = `<td>${r.name}</td><td>${r.course}</td><td>${minsToStr(m)}</td><td><button onclick='openBkEdit(${JSON.stringify(r)})'>수정</button></td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('bk-list-wrap').style.display = 'block';
  } catch(e) { alert("로딩 실패"); }
}

function openBkEdit(r) {
  const area = document.getElementById('bk-edit-area');
  area.style.display = 'block';
  document.getElementById('bk-row-idx').value = r.row;
  document.getElementById('bk-course').value = r.course;
  const m = toMins(r.hours);
  document.getElementById('bk-hours-h').value = Math.floor(m / 60);
  document.getElementById('bk-hours-m').value = m % 60;
  document.getElementById('bk-status').value = r.status;
  window.scrollTo({ top: area.offsetTop - 100, behavior: 'smooth' });
}

async function onBkUpdate() {
  const payload = {
    action: "update",
    row: document.getElementById('bk-row-idx').value,
    course: document.getElementById('bk-course').value,
    status: document.getElementById('bk-status').value,
    hours: (parseInt(document.getElementById('bk-hours-h').value) || 0) * 60 + (parseInt(document.getElementById('bk-hours-m').value) || 0)
  };
  try {
    const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    const res = await resp.json();
    if(res.result === "success") {
      showToast("수정 완료!");
      document.getElementById('bk-edit-area').style.display = 'none';
      loadBkList();
    }
  } catch(e) { alert("수정 실패"); }
}

function downloadSampleCSV() {
  const rows = [['사번','이름','과정명','시간(분)'],['20260001','최두원','엑셀 실무','120']];
  const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + rows.map(e => e.join(",")).join("\n");
  const link = document.createElement("a");
  link.setAttribute("href", encodeURI(csvContent));
  link.setAttribute("download", "근무복_교육이수_샘플.csv");
  document.body.appendChild(link); link.click();
}

// 초기 로드
window.onload = () => { if(window.location.hash === '#bk') showPage('bk'); };
</script>

</body>
</html>
